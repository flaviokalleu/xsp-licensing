name: Build Release Assets

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build install-server binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o install-server install-server.go
          chmod +x install-server

      - name: Build ZIP bundles
        run: |
          python3 dist/_make_zips.py

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp install-server release-assets/install-server
          cp setup.sh release-assets/setup.sh
          cp install-painel.sh release-assets/install-painel.sh
          cp dist/xsp-licensing-FULL.zip release-assets/xsp-licensing-FULL.zip
          cp dist/xsp-licensing-SERVER.zip release-assets/xsp-licensing-SERVER.zip
          cp dist/xsp-licensing-PAINEL.zip release-assets/xsp-licensing-PAINEL.zip
          ls -lh release-assets

      - name: Generate tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: XSP Licensing ${{ steps.tag.outputs.tag }}
          make_latest: true
          files: release-assets/*
          body: |
            Assets gerados automaticamente.

            Servidor central:
            ```bash
            curl -sSL https://raw.githubusercontent.com/flaviokalleu/xsp-licensing/master/setup.sh | sudo bash
            ```

            O `setup.sh` baixa primeiro:
            `xsp-licensing-SERVER.zip`

            Instalador do cliente:
            `install-painel.sh`

            Bundle completo:
            `xsp-licensing-FULL.zip`

            Commit: ${{ github.sha }}
