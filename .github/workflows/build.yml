name: Build & Release

on:
  push:
    branches: [main, master]
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  # ── 1. Imagem Docker do instalador (para quem quiser usar via docker run) ──
  docker:
    name: Build imagem Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/flaviokalleu/xsp-licensing
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}

  # ── 2. Binário Go autocontido para o servidor ─────────────────────────────
  binary:
    name: Build binário install-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Gerar bundle.zip
        run: |
          zip -r bundle.zip \
            api-license \
            admin-dashboard \
            customer-portal \
            landing \
            builder \
            painel-image \
            xsp-loader \
            docker-compose.yml \
            Makefile \
            .env.example \
            install-painel.sh \
            install-server.sh \
            Caddyfile

      - name: Compilar install-server (Linux amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o install-server install-server.go
          chmod +x install-server

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: install-server
          path: install-server
          retention-days: 7

  # ── 3. GitHub Release com todos os assets ────────────────────────────────
  release:
    name: Criar GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, binary]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binário
        uses: actions/download-artifact@v4
        with:
          name: install-server

      - name: Tornar executável
        run: chmod +x install-server

      - name: Gerar tag com data
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Criar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "XSP Licensing ${{ steps.tag.outputs.tag }}"
          files: |
            install-server
            setup.sh
            install-painel.sh
          body: |
            ## Instalação

            ### 🖥️ Servidor Central (sua VPS)

            **Opção A — Um comando (recomendado):**
            ```bash
            curl -sSL https://raw.githubusercontent.com/flaviokalleu/xsp-licensing/master/setup.sh | sudo bash
            ```

            **Opção B — Binário autocontido (sem git/clone):**
            ```bash
            wget https://github.com/flaviokalleu/xsp-licensing/releases/latest/download/install-server
            chmod +x install-server
            sudo ./install-server
            ```

            **Opção C — Via Docker (sem instalar nada):**
            ```bash
            docker run --rm -it \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /root:/root -w /root \
              ghcr.io/flaviokalleu/xsp-licensing:latest
            ```

            ---

            ### 👤 Cliente (VPS do cliente — instala o painel com KEY)

            O cliente recebe este comando pelo Admin Dashboard após você criar a KEY:
            ```bash
            curl -sSL http://SEU_IP/install.sh | sudo bash -s -- XSP-XXXX-XXXX-XXXX-XXXX
            ```
            > O instalador **para automaticamente** se a KEY for inválida, revogada ou expirada.

            ---

            ### ⚙️ Comandos pós-instalação (no servidor)
            ```bash
            cd /opt/xsp-licensing
            docker compose ps          # estado dos containers
            docker compose logs -f     # logs em tempo real
            make release               # publica nova versão do painel
            ```

            ---
            Commit: `${{ github.sha }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
